seed: 1337

data:
  raw_dir: "C:/Users/sriva/Downloads/train_pairs/raw"
  he_dir: "C:/Users/sriva/Downloads/train_pairs/he"
  ext: [".png"]
  patch_size: 256
  bag_size: 16
  num_workers: 2

model:
  generator:
    base_channels: 32
  encoder:
    embed_dim: 256
  attention:
    type: "gated"

train:
  epochs: 5
  batch_size: 2
  lr: 0.0002
  weight_decay: 0.0
  amp: true
  grad_clip: 1.0
  log_every: 25

loss:
  lambda_recon: 1.0
  lambda_gan: 0.0
  attention_weighted_recon: true

gan:
  gan_mode: "lsgan"
  d_base_channels: 32

output:
  out_dir: "C:/Users/sriva/Downloads/runs/mil_hex"
  save_best: true